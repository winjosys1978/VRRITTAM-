<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VRRITTAM Login</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#0f4c81,#4facfe);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{
background:#ffffff;
padding:40px;
width:320px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,.3);
text-align:center;
}

h2{
color:#0f4c81;
margin-bottom:20px;
}
input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
}

button{
width:100%;
padding:12px;
background:#0f4c81;
color:white;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#08365c;
}

a{
text-decoration:none;
color:#0f4c81;
font-size:14px;
}

</style>
</head>

<body>

<div class="login-box">

<h2>VRRITTAM Login</h2>

<input type="email" placeholder="Email Address">

<input type="password" placeholder="Password">
<button>Login</button>

<br><br>

<a href="#">Forgot Password?</a>

<br><br>

<a href="#">Create Account</a>

</div>

</body>
</html>
